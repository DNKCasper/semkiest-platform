version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: semkiest
      POSTGRES_PASSWORD: semkiest
      POSTGRES_DB: semkiest
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semkiest -d semkiest"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - semkiest-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - semkiest-network

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: semkiest
      MINIO_ROOT_PASSWORD: semkiest123
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - semkiest-network

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts
    entrypoint: /bin/sh /scripts/init-minio.sh
    networks:
      - semkiest-network

  api:
    build: ./apps/api
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://semkiest:semkiest@postgres:5432/semkiest
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - semkiest-network

  worker:
    build: ./apps/worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://semkiest:semkiest@postgres:5432/semkiest
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: semkiest
      MINIO_SECRET_KEY: semkiest123
      NODE_ENV: development
    networks:
      - semkiest-network

  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    networks:
      - semkiest-network

networks:
  semkiest-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
