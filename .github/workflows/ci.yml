name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ---------------------------------------------------------------------------
  # Lint & type-check
  # ---------------------------------------------------------------------------
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @semkiest/db generate

      - name: Build agent packages
        run: |
          echo "=== Building agent packages with tsc ==="
          for pkg in base accessibility api explorer performance security ui-functional; do
            dir="packages/agents/$pkg"
            if [ -f "$dir/tsconfig.json" ]; then
              echo "  Building $pkg..."
              (cd "$dir" && npx tsc -p tsconfig.json 2>&1 || echo "  WARN: $pkg tsc had errors")
            fi
          done
          echo "=== Agent package builds complete ==="

      - name: Type check
        run: pnpm turbo run typecheck

  # ---------------------------------------------------------------------------
  # Build
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @semkiest/db generate

      - name: Build agent packages
        run: |
          for pkg in base accessibility api explorer performance security ui-functional; do
            dir="packages/agents/$pkg"
            if [ -f "$dir/tsconfig.json" ]; then
              echo "Building $pkg..."
              (cd "$dir" && npx tsc -p tsconfig.json 2>&1 || true)
            fi
          done

      - name: Build all packages
        run: pnpm turbo run build

  # ---------------------------------------------------------------------------
  # Database migration + tests
  # ---------------------------------------------------------------------------
  test:
    name: Test (with DB)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: semkiest
          POSTGRES_PASSWORD: semkiest
          POSTGRES_DB: semkiest_test
        ports:
          - 5432:5432
        options: >
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://semkiest:semkiest@localhost:5432/semkiest_test
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @semkiest/db generate

      - name: Build agent packages
        run: |
          for pkg in base accessibility api explorer performance security ui-functional; do
            dir="packages/agents/$pkg"
            if [ -f "$dir/tsconfig.json" ]; then
              (cd "$dir" && npx tsc -p tsconfig.json 2>&1 || true)
            fi
          done

      - name: Run database migrations
        working-directory: packages/db
        run: npx prisma migrate deploy

      - name: Seed test database
        run: pnpm --filter @semkiest/db seed:test

      - name: Run tests
        run: pnpm turbo run test
