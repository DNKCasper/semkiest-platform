name: Deploy to Staging

on:
  workflow_run:
    workflows:
      - Build and Test
    types:
      - completed
    branches:
      - main

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER_STAGING || 'semkiest-staging' }}
  ENVIRONMENT: staging

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Guard: only deploy if the build-and-test workflow succeeded
  # ─────────────────────────────────────────────────────────────────────────────
  check-build:
    name: Verify Build Success
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      image-tag: ${{ steps.get-tag.outputs.image-tag }}

    permissions:
      actions: read

    steps:
      - name: Derive image tag from triggering SHA
        id: get-tag
        run: |
          # The image tag is the first 8 chars of the SHA that triggered the build
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "image-tag=${SHA::8}" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────────────────────
  # Run database migrations before deploying new application code
  # ─────────────────────────────────────────────────────────────────────────────
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: check-build
    environment: staging

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run database migrations
        run: |
          chmod +x scripts/migrate.sh
          ./scripts/migrate.sh
        env:
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
          ECS_CLUSTER: ${{ env.ECS_CLUSTER }}
          ECS_MIGRATION_TASK_DEFINITION: ${{ vars.ECS_MIGRATION_TASK_DEF_STAGING }}
          ECS_MIGRATION_SUBNET: ${{ secrets.ECS_MIGRATION_SUBNET_STAGING }}
          ECS_MIGRATION_SECURITY_GROUP: ${{ secrets.ECS_MIGRATION_SG_STAGING }}
          IMAGE_TAG: ${{ needs.check-build.outputs.image-tag }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy all three services to staging ECS
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy ${{ matrix.service.name }} to Staging
    runs-on: ubuntu-latest
    needs:
      - check-build
      - migrate
    environment: staging

    permissions:
      id-token: write
      contents: read
      deployments: write

    strategy:
      # Deploy services in parallel — they are independently deployed
      max-parallel: 3
      matrix:
        service:
          - name: api
            ecs_service: ${{ vars.ECS_SERVICE_API_STAGING || 'semkiest-staging-api' }}
            task_def_family: ${{ vars.ECS_TASK_DEF_API_STAGING || 'semkiest-staging-api' }}
            container_name: api
            health_path: /health
            port: 3001
          - name: web
            ecs_service: ${{ vars.ECS_SERVICE_WEB_STAGING || 'semkiest-staging-web' }}
            task_def_family: ${{ vars.ECS_TASK_DEF_WEB_STAGING || 'semkiest-staging-web' }}
            container_name: web
            health_path: /api/health
            port: 3000
          - name: worker
            ecs_service: ${{ vars.ECS_SERVICE_WORKER_STAGING || 'semkiest-staging-worker' }}
            task_def_family: ${{ vars.ECS_TASK_DEF_WORKER_STAGING || 'semkiest-staging-worker' }}
            container_name: worker
            health_path: ''
            port: ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy ${{ matrix.service.name }} service
        id: deploy
        run: |
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh
        env:
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
          ECS_CLUSTER: ${{ env.ECS_CLUSTER }}
          ECS_SERVICE: ${{ matrix.service.ecs_service }}
          TASK_DEF_FAMILY: ${{ matrix.service.task_def_family }}
          CONTAINER_NAME: ${{ matrix.service.container_name }}
          IMAGE_URI: ${{ env.ECR_REGISTRY }}/semkiest/${{ matrix.service.name }}:${{ needs.check-build.outputs.image-tag }}
          HEALTH_CHECK_PATH: ${{ matrix.service.health_path }}
          HEALTH_CHECK_PORT: ${{ matrix.service.port }}
          LOAD_BALANCER_URL: ${{ secrets.STAGING_LB_URL }}
          SECRETS_MANAGER_PREFIX: semkiest/staging
          AWS_REGION: ${{ env.AWS_REGION }}
          DEPLOY_TIMEOUT: '300'
          HEALTH_CHECK_RETRIES: '10'

  # ─────────────────────────────────────────────────────────────────────────────
  # Notify on deployment outcome
  # ─────────────────────────────────────────────────────────────────────────────
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Deployment succeeded
        if: needs.deploy.result == 'success'
        run: |
          echo "✅ Staging deployment succeeded for SHA ${{ github.event.workflow_run.head_sha }}"

      - name: Deployment failed
        if: needs.deploy.result != 'success'
        run: |
          echo "❌ Staging deployment FAILED for SHA ${{ github.event.workflow_run.head_sha }}"
          exit 1
