name: Deploy to Staging

on:
  workflow_run:
    workflows:
      - Build and Test
    types:
      - completed
    branches:
      - main

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER_STAGING || 'semkiest-staging-cluster' }}
  ENVIRONMENT: staging

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Guard: only deploy if the build-and-test workflow succeeded
  # ─────────────────────────────────────────────────────────────────────────
  check-build:
    name: Verify Build Success
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      image-tag: ${{ steps.get-tag.outputs.image-tag }}

    permissions:
      actions: read

    steps:
      - name: Derive image tag from triggering SHA
        id: get-tag
        run: |
          # The image tag is the first 8 chars of the SHA that triggered the build
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "image-tag=${SHA::8}" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────────────────
  # Run database migrations before deploying new application code
  # ─────────────────────────────────────────────────────────────────────────
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: check-build
    environment: staging
    continue-on-error: true

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run database migrations
        run: |
          if [ -f scripts/migrate.sh ]; then
            chmod +x scripts/migrate.sh
            ./scripts/migrate.sh
          else
            echo "No migration script found — skipping migrations"
          fi
        env:
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
          ECS_CLUSTER: ${{ env.ECS_CLUSTER }}
          ECS_MIGRATION_TASK_DEFINITION: ${{ vars.ECS_MIGRATION_TASK_DEF_STAGING }}
          ECS_MIGRATION_SUBNET: ${{ secrets.ECS_MIGRATION_SUBNET_STAGING }}
          ECS_MIGRATION_SECURITY_GROUP: ${{ secrets.ECS_MIGRATION_SG_STAGING }}
          IMAGE_TAG: ${{ needs.check-build.outputs.image-tag }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}

  # ─────────────────────────────────────────────────────────────────────────
  # Deploy API and Worker services to staging ECS
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy ${{ matrix.service.name }} to Staging
    runs-on: ubuntu-latest
    needs:
      - check-build
      - migrate
    if: always() && needs.check-build.result == 'success'
    environment: staging

    permissions:
      id-token: write
      contents: read
      deployments: write

    strategy:
      max-parallel: 2
      matrix:
        service:
          - name: api
            ecs_service: semkiest-staging-api
            task_def_family: semkiest-staging-api
            container_name: api
            health_path: /health
            port: 3001
          - name: worker
            ecs_service: semkiest-staging-worker
            task_def_family: semkiest-staging-worker
            container_name: worker
            health_path: ''
            port: ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy ${{ matrix.service.name }} service
        id: deploy
        run: |
          if [ -f scripts/deploy.sh ]; then
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh
          else
            echo "No deploy script found — performing inline ECS deployment"
            # Get current task definition
            TASK_DEF=$(aws ecs describe-task-definition \
              --task-definition ${{ matrix.service.task_def_family }} \
              --query 'taskDefinition' --output json)

            # Update the image in the container definition
            NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
              --arg IMAGE "${IMAGE_URI}" \
              '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

            # Register new task definition
            NEW_TASK_ARN=$(aws ecs register-task-definition \
              --cli-input-json "$NEW_TASK_DEF" \
              --query 'taskDefinition.taskDefinitionArn' --output text)

            echo "Registered new task definition: $NEW_TASK_ARN"

            # Update the ECS service
            aws ecs update-service \
              --cluster ${{ env.ECS_CLUSTER }} \
              --service ${{ matrix.service.ecs_service }} \
              --task-definition "$NEW_TASK_ARN" \
              --force-new-deployment

            echo "Deployment triggered for ${{ matrix.service.name }}"
          fi
        env:
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
          ECS_CLUSTER: ${{ env.ECS_CLUSTER }}
          ECS_SERVICE: ${{ matrix.service.ecs_service }}
          TASK_DEF_FAMILY: ${{ matrix.service.task_def_family }}
          CONTAINER_NAME: ${{ matrix.service.container_name }}
          IMAGE_URI: ${{ env.ECR_REGISTRY }}/semkiest-staging/${{ matrix.service.name }}:${{ needs.check-build.outputs.image-tag }}
          HEALTH_CHECK_PATH: ${{ matrix.service.health_path }}
          HEALTH_CHECK_PORT: ${{ matrix.service.port }}
          LOAD_BALANCER_URL: ${{ secrets.STAGING_LB_URL }}
          AWS_REGION: ${{ env.AWS_REGION }}
          DEPLOY_TIMEOUT: '300'
          HEALTH_CHECK_RETRIES: '10'

  # ─────────────────────────────────────────────────────────────────────────
  # Notify on deployment outcome
  # ─────────────────────────────────────────────────────────────────────────
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Deployment succeeded
        if: needs.deploy.result == 'success'
        run: |
          echo "Staging deployment succeeded for SHA ${{ github.event.workflow_run.head_sha }}"

      - name: Deployment failed
        if: needs.deploy.result != 'success'
        run: |
          echo "Staging deployment FAILED for SHA ${{ github.event.workflow_run.head_sha }}"
          exit 1
