name: Deploy to Staging

on:
  workflow_run:
    workflows:
      - Build and Test
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER_STAGING || 'semkiest-staging-cluster' }}
  ENVIRONMENT: staging

jobs:
  check-build:
    name: Verify Build Success
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      image-tag: ${{ steps.get-tag.outputs.image-tag }}

    permissions:
      actions: read

    steps:
      - name: Derive image tag from triggering SHA
        id: get-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHA="${{ github.sha }}"
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
          fi
          echo "image-tag=${SHA::8}" >> $GITHUB_OUTPUT
          echo "Using image tag: ${SHA::8}"

  # ─────────────────────────────────────────────────────────────────────────
  # Run database migrations before deploying new application code
  # ─────────────────────────────────────────────────────────────────────────
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: check-build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run database migrations via ECS one-off task
        run: |
          chmod +x scripts/migrate.sh
          ./scripts/migrate.sh
        env:
          ENVIRONMENT: staging
          ECS_CLUSTER: ${{ env.ECS_CLUSTER }}
          ECS_MIGRATION_TASK_DEFINITION: ${{ vars.ECS_MIGRATION_TASK_DEF_STAGING || 'semkiest-staging-api' }}
          ECS_MIGRATION_SUBNET: ${{ secrets.ECS_MIGRATION_SUBNET_STAGING }}
          ECS_MIGRATION_SECURITY_GROUP: ${{ secrets.ECS_MIGRATION_SG_STAGING }}
          IMAGE_TAG: ${{ needs.check-build.outputs.image-tag }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
          MIGRATION_TIMEOUT: '180'

  deploy:
    name: Deploy ${{ matrix.service.name }} to Staging
    runs-on: ubuntu-latest
    needs:
      - check-build
      - migrate

    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        service:
          - name: api
            ecs_service: semkiest-staging-api
            task_def_family: semkiest-staging-api
            container_name: api
          - name: worker
            ecs_service: semkiest-staging-worker
            task_def_family: semkiest-staging-worker
            container_name: worker

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get current task definition
        id: get-task-def
        run: |
          echo "Fetching task definition: ${{ matrix.service.task_def_family }}"
          aws ecs describe-task-definition \
            --task-definition "${{ matrix.service.task_def_family }}" \
            --query 'taskDefinition' --output json > /tmp/task-def.json
          echo "Current image:"
          jq -r '.containerDefinitions[0].image' /tmp/task-def.json

      - name: Update container image in task definition
        run: |
          IMAGE_URI="${{ env.ECR_REGISTRY }}/semkiest-staging/${{ matrix.service.name }}:${{ needs.check-build.outputs.image-tag }}"
          CONTAINER="${{ matrix.service.container_name }}"
          echo "Setting image to: ${IMAGE_URI}"
          echo "For container: ${CONTAINER}"

          jq \
            --arg container "${CONTAINER}" \
            --arg image "${IMAGE_URI}" \
            '(.containerDefinitions[] | select(.name == $container)).image = $image |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                 .placementConstraints, .compatibilities, .registeredAt,
                 .registeredBy, .deregisteredAt)' \
            /tmp/task-def.json > /tmp/new-task-def.json

          echo "New task definition container image:"
          jq -r '.containerDefinitions[0].image' /tmp/new-task-def.json

      - name: Register new task definition
        id: register
        run: |
          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/new-task-def.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered: ${NEW_TASK_ARN}"
          echo "task-arn=${NEW_TASK_ARN}" >> $GITHUB_OUTPUT

      - name: Update ECS service
        run: |
          echo "Updating service ${{ matrix.service.ecs_service }} in cluster ${{ env.ECS_CLUSTER }}"
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ matrix.service.ecs_service }}" \
            --task-definition "${{ steps.register.outputs.task-arn }}" \
            --force-new-deployment \
            --query 'service.serviceName' --output text
          echo "Service update triggered"

      - name: Wait for service stability
        continue-on-error: true
        run: |
          echo "Waiting for ${{ matrix.service.ecs_service }} to stabilize (up to 5 min)..."
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ matrix.service.ecs_service }}" || true
          echo "Done waiting"

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Deployment succeeded
        if: needs.deploy.result == 'success'
        run: echo "Staging deployment succeeded"

      - name: Deployment failed
        if: needs.deploy.result != 'success'
        run: |
          echo "Staging deployment had issues - check individual service jobs"
          exit 1
