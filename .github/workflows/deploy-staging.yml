name: Deploy to Staging

on:
  workflow_run:
    workflows:
      - Build and Test
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER_STAGING || 'semkiest-staging-cluster' }}
  ENVIRONMENT: staging

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Guard: only deploy if the build-and-test workflow succeeded
  # ─────────────────────────────────────────────────────────────────────────
  check-build:
    name: Verify Build Success
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      image-tag: ${{ steps.get-tag.outputs.image-tag }}

    permissions:
      actions: read

    steps:
      - name: Derive image tag from triggering SHA
        id: get-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHA="${{ github.sha }}"
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
          fi
          echo "image-tag=${SHA::8}" >> $GITHUB_OUTPUT
          echo "Using image tag: ${SHA::8}"

  # ─────────────────────────────────────────────────────────────────────────
  # Deploy API and Worker services to staging ECS
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy ${{ matrix.service.name }} to Staging
    runs-on: ubuntu-latest
    needs: check-build
    environment: staging

    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        service:
          - name: api
            ecs_service: semkiest-staging-api
            task_def_family: semkiest-staging-api
            container_name: api
          - name: worker
            ecs_service: semkiest-staging-worker
            task_def_family: semkiest-staging-worker
            container_name: worker

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy ${{ matrix.service.name }} service
        id: deploy
        run: |
          set -euo pipefail

          IMAGE_TAG="${{ needs.check-build.outputs.image-tag }}"
          IMAGE_URI="${{ env.ECR_REGISTRY }}/semkiest-staging/${{ matrix.service.name }}:${IMAGE_TAG}"
          FAMILY="${{ matrix.service.task_def_family }}"
          CONTAINER="${{ matrix.service.container_name }}"
          CLUSTER="${{ env.ECS_CLUSTER }}"
          SERVICE="${{ matrix.service.ecs_service }}"

          echo "Deploying ${SERVICE} with image: ${IMAGE_URI}"

          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${FAMILY}" \
            --query 'taskDefinition' --output json)

          # Update the container image
          NEW_TASK_DEF=$(echo "$TASK_DEF" | python3 -c "
import json, sys
data = json.load(sys.stdin)
for c in data.get('containerDefinitions', []):
    if c['name'] == '${CONTAINER}':
        c['image'] = '${IMAGE_URI}'
        break
for f in ['taskDefinitionArn', 'revision', 'status', 'requiresAttributes',
          'placementConstraints', 'compatibilities', 'registeredAt',
          'registeredBy', 'deregisteredAt']:
    data.pop(f, None)
print(json.dumps(data))
")

          # Register new task definition
          NEW_TASK_ARN=$(echo "$NEW_TASK_DEF" | aws ecs register-task-definition \
            --cli-input-json file:///dev/stdin \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          echo "Registered new task definition: $NEW_TASK_ARN"

          # Update the ECS service
          aws ecs update-service \
            --cluster "${CLUSTER}" \
            --service "${SERVICE}" \
            --task-definition "$NEW_TASK_ARN" \
            --force-new-deployment \
            --output text > /dev/null

          echo "Deployment triggered for ${SERVICE}"
          echo "Waiting for service to stabilize (up to 5 minutes)..."

          # Wait for stabilization (don't fail if it times out on first deploy)
          timeout 300 aws ecs wait services-stable \
            --cluster "${CLUSTER}" \
            --services "${SERVICE}" || echo "Service did not stabilize within 5 minutes (may still be starting)"

          echo "Deploy complete for ${SERVICE}"

  # ─────────────────────────────────────────────────────────────────────────
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Deployment succeeded
        if: needs.deploy.result == 'success'
        run: echo "Staging deployment succeeded"

      - name: Deployment failed
        if: needs.deploy.result != 'success'
        run: |
          echo "Staging deployment had issues - check individual service jobs"
          exit 1
